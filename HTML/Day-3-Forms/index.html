<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job application form</title>
</head>
<body>
    <h1>Registration form</h1>
    <form>

        <!-- Name -->
        <label>Full Name:</label><br>
        <input type="text" placeholder="Enter your full name"><br><br>

        <!-- Email -->
        <label>Email:</label><br>
        <input type="email" placeholder="Enter your email"><br><br>

        <!-- Phone -->
        <label>Phone Number:</label><br>
        <input type="text" placeholder="Enter your phone number"><br><br>

        <!-- Password -->
        <label>Password:</label><br>
        <input type="password" placeholder="Enter password"><br><br>

        <!-- Gender -->
        <label>Gender:</label><br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <input type="radio" name="gender"> Other<br><br>

        <!-- Skills -->
        <label>Skills:</label><br>
        <input type="checkbox"> HTML
        <input type="checkbox"> CSS
        <input type="checkbox"> JavaScript
        <input type="checkbox"> React<br><br>

        <!-- Dropdown -->
        <label>Preferred Role:</label><br>
        <select>
            <option>Frontend Developer</option>
            <option>Backend Developer</option>
            <option>Full Stack Developer</option>
        </select><br><br>

        <!-- Message -->
        <label>Why should we hire you?</label><br>
        <textarea placeholder="Write your answer"></textarea><br><br>

        <!-- Submit -->
        <input type="submit" value="Apply Now">

    </form>
</body>
</html>
